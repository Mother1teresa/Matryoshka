name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: List files for debugging
        run: |
          echo "Current working directory: $(pwd)"
          echo "Files in the current directory:"
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: sudo npm ci

      - name: Build frontend
        run: sudo npm run build

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          set -x
          sudo docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest -f Dockerfile.frontend .

      - name: Push Docker image
        run: |
          set -x
          sudo docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      - name: Install k3s
        run: |
          curl -sfL https://get.k3s.io | sudo sh -s - --no-deploy traefik
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          export KUBECONFIG=kubeconfig
          sudo k3s kubectl get nodes

      - name: Deploy to Kubernetes
        run: |
          sudo k3s kubectl set image deployment/frontend-deployment frontend=${{ secrets.DOCKER_USERNAME }}/frontend:latest
          sudo k3s kubectl rollout status deployment/frontend-deployment
