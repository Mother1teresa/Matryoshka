name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Проверка исходного кода
      - name: Checkout repo
        uses: actions/checkout@v3

      # Шаг 2: Установка Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Шаг 3: Установка зависимостей
      - name: Install dependencies
        run: npm ci

      # Шаг 4: Сборка фронтенда
      - name: Build frontend
        run: npm run build

      # Шаг 5: Установка Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      # Шаг 6: Логин в Docker Registry
      - name: Log in to Docker registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Шаг 7: Сборка Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest -f Dockerfile.frontend .

      # Шаг 8: Публикация Docker image в репозиторий
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      # Шаг 9: Установка k3s
      - name: Install k3s
        run: |
          curl -sfL https://get.k3s.io | sh -
          sudo ln -s /usr/local/bin/k3s /usr/bin/k3s
          sudo systemctl enable k3s
          sudo systemctl start k3s
          # Убедимся, что k3s запущен
          sudo k3s kubectl get nodes

      # Шаг 10: Настройка kubectl через k3s
      - name: Set up kubectl using k3s
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          export KUBECONFIG=kubeconfig
          # Проверка подключения с помощью k3s kubectl
          sudo k3s kubectl get nodes

      # Шаг 11: Применение конфигурации деплоймента (создание деплоймента)
      - name: Apply frontend deployment configuration
        run: |
          sudo k3s kubectl apply -f frontend-deployment.yml
          sudo k3s kubectl get deployments

      # Шаг 12: Обновление образа в деплойменте
      - name: Update frontend deployment image
        run: |
          sudo k3s kubectl set image deployment/frontend-deployment frontend=${{ secrets.DOCKER_USERNAME }}/frontend:latest
          sudo k3s kubectl rollout status deployment/frontend-deployment
