name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and Build
        run: |
          npm install
          npm run build
 
      - name: Deploy to server via SCP
        uses: appleboy/scp-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          # Используй имя пользователя, под которым ты заходишь на сервер (front)
          username: ${{ secrets.SERVER_USER }} 
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          # Копируем всё содержимое папки dist в /var/www/html/dist
          source: "dist/"
          target: "/var/www/html"
          # strip_components убрали, чтобы dist осталась папкой