name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and Build
        run: |
          npm install
          npm run build
 
      - name: Deploy to server via SCP
        uses: appleboy/scp-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }} # Убедись, что это 'front' или пользователь с правами на запись
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "dist/"          # Берем содержимое папки сборки
          target: "/var/www/html"  # В итоге получится /var/www/html/dist/
